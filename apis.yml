apis:
- aid: bloomberg-financial-solutions:blpapi
  name: Bloomberg Open API (BLPAPI)
  description: Core Bloomberg API providing real-time and reference data access for
    financial applications across trading, risk, analytics, and compliance workflows.
  humanURL: https://bloomberg.github.io/blpapi-docs/
  baseURL: blpapi://localhost:8194
  tags:
  - Core API
  - Market Data
  - Financial Data
  properties:
  - type: Documentation
    url: https://bloomberg.github.io/blpapi-docs/
- aid: bloomberg-financial-solutions:port-api
  name: Bloomberg PORT (Portfolio Risk and Analytics)
  description: Bloomberg's portfolio risk and analytics solution providing attribution,
    risk factor analysis, stress testing, and regulatory reporting for asset managers
    and institutional investors.
  humanURL: https://www.bloomberg.com/professional/solution/portfolio-risk-analytics/
  baseURL: blpapi://localhost:8194
  tags:
  - Portfolio Analytics
  - Risk
  - Attribution
  - Regulatory
  properties:
  - type: Documentation
    url: https://www.bloomberg.com/professional/solution/portfolio-risk-analytics/
- aid: bloomberg-financial-solutions:aim-api
  name: Bloomberg AIM (Asset and Investment Manager)
  description: Bloomberg's order and portfolio management system for asset managers
    supporting the full investment lifecycle from order creation through compliance
    and settlement.
  humanURL: https://www.bloomberg.com/professional/solution/aim/
  baseURL: blpapi://localhost:8194
  tags:
  - Order Management
  - Portfolio Management
  - Compliance
  - OMS
  properties:
  - type: Documentation
    url: https://www.bloomberg.com/professional/solution/aim/
